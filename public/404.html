<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Kinetic Hub</title>
  <style>
    :root {
      --bg: #070b10;
      --bg-soft: #101924;
      --text: #e8f2ff;
      --muted: #9bb0c7;
      --accent: #19c88b;
      --accent-2: #00d4ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(25, 200, 139, 0.22), transparent 40%),
        radial-gradient(circle at 80% 10%, rgba(0, 212, 255, 0.24), transparent 42%),
        linear-gradient(160deg, var(--bg) 0%, var(--bg-soft) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: rgba(8, 12, 18, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
    }

    .code {
      margin: 0;
      font-size: clamp(3.2rem, 14vw, 6rem);
      line-height: 1;
      color: var(--accent-2);
      letter-spacing: 0.08em;
      text-shadow: 0 0 22px rgba(0, 212, 255, 0.4);
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(1.35rem, 4vw, 2rem);
    }

    p {
      margin: 0 auto;
      max-width: 46ch;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1rem;
    }

    .actions {
      margin-top: 26px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .btn-primary {
      color: #04130d;
      background: var(--accent);
      box-shadow: 0 8px 24px rgba(25, 200, 139, 0.35);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary:hover {
      box-shadow: 0 12px 28px rgba(25, 200, 139, 0.45);
    }
  </style>

</head>
<body>

  <main class="card" role="main" aria-labelledby="error-title">
    <p class="code" aria-hidden="true">404</p>
    <h1 id="error-title">Esta ruta no existe</h1>
    <p>
      La pagina que intentaste abrir no esta disponible o fue movida.
      Puedes regresar al inicio o continuar hacia los eventos activos.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="index.html">Ir al inicio</a>
      <a class="btn btn-secondary" href="eventos.html">Ver eventos</a>
    </div>
  </main>
</body>
</html>
